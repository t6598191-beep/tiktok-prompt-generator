<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Grok Prompt Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;min-height:100vh}
.hdr{background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:24px 16px 20px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.06)}
.hdr .sub{font-size:9px;font-weight:700;letter-spacing:3px;color:#ff6b6b;text-transform:uppercase;margin-bottom:6px}
.hdr h1{font-size:20px;font-weight:900;color:#fff;line-height:1.3}
.hdr p{font-size:11px;color:#888;margin-top:6px}
.api-bar{margin:12px 14px;padding:12px;background:rgba(168,85,247,0.06);border:1px solid rgba(168,85,247,0.2);border-radius:12px}
.api-bar .al{font-size:10px;font-weight:700;color:#a855f7;margin-bottom:4px}
.api-bar input{width:100%;padding:8px 10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#f5f5f7;font-size:12px;outline:none;font-family:monospace}
.api-bar .hint{font-size:9px;color:#777;margin-top:4px}
.api-bar .hint a{color:#a855f7;text-decoration:none}
.rule{margin:12px 14px;padding:14px;background:rgba(255,107,107,0.05);border:1px solid rgba(255,107,107,0.15);border-radius:12px}
.rule-title{font-size:10px;font-weight:700;color:#ff6b6b;margin-bottom:6px}
.rule-row{display:flex;gap:6px}
.rule-card{flex:1;background:rgba(0,0,0,0.3);border-radius:8px;padding:8px 4px;text-align:center}
.rule-card .t{font-size:9px;color:#ff6b6b;font-weight:700}
.rule-card .r{font-size:11px;font-weight:700;margin:2px 0}
.rule-card .d{font-size:8px;color:#777}
.wrap{padding:14px}
.imgs{display:flex;gap:10px;margin-bottom:14px}
.img-slot{flex:1}
.img-slot-label{font-size:10px;font-weight:600;color:#999;margin-bottom:4px}
.img-slot-label .badge{color:#ffa502;font-size:9px}
.file-input{display:block;width:100%;padding:12px 8px;background:rgba(255,255,255,0.04);border:2px dashed rgba(255,255,255,0.15);border-radius:10px;color:#888;font-size:12px}
.file-input::-webkit-file-upload-button{background:rgba(255,255,255,0.1);color:#ccc;border:1px solid rgba(255,255,255,0.2);border-radius:6px;padding:6px 12px;font-size:11px;margin-right:8px}
.img-prev{position:relative;width:100%;height:100px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,107,107,0.3);display:none}
.img-prev img{width:100%;height:100%;object-fit:cover}
.img-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.8);border:none;color:#ff6b6b;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;z-index:10}
.lbl{font-size:11px;font-weight:600;color:#999;display:block;margin-bottom:4px}
input[type=text],select{width:100%;padding:10px 12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#f5f5f7;font-size:13px;outline:none;-webkit-appearance:none}
.mb{margin-bottom:14px}
.ai-status{margin-top:6px;font-size:11px;color:#ffa502}
.sn-row{margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;display:none}
.sn-row .tag{font-size:12px;font-weight:700;color:#a855f7;background:rgba(168,85,247,0.1);padding:2px 8px;border-radius:6px}
.sn-row input{flex:1;min-width:60px;padding:3px 6px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#f5f5f7;font-size:11px;outline:none}
.scene-info{margin-top:4px;font-size:10px;color:#ffa502;display:none}
.merit-info{margin-top:4px;font-size:10px;color:#2ed573;background:rgba(46,213,115,0.07);border-radius:6px;padding:4px 8px;display:none}
.gen-btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;transition:all 0.3s}
.gen-btn:disabled{background:rgba(255,255,255,0.05);color:#555;cursor:default}
.results{padding:16px 14px 40px;display:none}
.img-prompt-sec{background:rgba(168,85,247,0.07);border:2px solid rgba(168,85,247,0.35);border-radius:14px;padding:16px;margin-bottom:16px}
.img-prompt-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.img-prompt-hdr .tt{font-size:12px;font-weight:700;color:#a855f7}
.img-prompt-hdr .step{font-size:10px;color:#888;background:rgba(255,255,255,0.05);padding:3px 8px;border-radius:6px}
.gemini-hint{font-size:10px;color:#a855f7;background:rgba(168,85,247,0.1);border-radius:8px;padding:8px 10px;margin-bottom:10px;line-height:1.5}
.gemini-hint b{color:#c084fc}
.gen-img-area{margin:10px 0;text-align:center}
.gen-img-area img{max-width:100%;max-height:300px;border-radius:12px;border:2px solid rgba(168,85,247,0.3)}
.gen-img-btn{width:100%;padding:10px;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff}
.gen-img-btn:disabled{opacity:0.4;cursor:default}
.gen-img-btn.loading{background:rgba(168,85,247,0.3);color:#a855f7}
.gen-img-dl{display:inline-block;margin-top:6px;padding:6px 16px;background:rgba(46,213,115,0.15);color:#2ed573;border:1px solid rgba(46,213,115,0.3);border-radius:8px;font-size:11px;font-weight:600;text-decoration:none}
.preview{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 14px;margin-bottom:14px}
.prev-row{display:flex;gap:10px;margin-bottom:10px}
.prev-row>div{flex:1}
.prev-row .ll{font-size:8px;font-weight:700;margin-bottom:2px}
.speech-sec{border-top:1px solid rgba(255,255,255,0.06);padding-top:8px}
.speech-sec .ll{font-size:8px;font-weight:700;color:#a855f7;margin-bottom:4px}
.speech-line{display:flex;gap:6px;margin-bottom:4px}
.speech-line .la{font-size:9px;font-weight:700;min-width:24px}
.speech-line .tx{font-size:11px;color:#ccc;line-height:1.4}
.copy-box{border-radius:14px;padding:16px;margin-bottom:14px}
.copy-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.copy-hdr .left{display:flex;align-items:center;gap:8px}
.copy-hdr .tag{color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px}
.copy-hdr .sub{color:#888;font-size:11px}
.copy-btn{border:none;border-radius:8px;padding:5px 14px;font-size:11px;font-weight:600;cursor:pointer}
.copy-pre{color:#ddd;font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-word;font-family:monospace;margin:0;padding:10px;background:rgba(0,0,0,0.3);border-radius:8px;max-height:180px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.regen{width:100%;padding:10px;background:rgba(255,255,255,0.04);color:#888;border:1px solid rgba(255,255,255,0.1);border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;margin-top:4px}
.sec-title{font-size:10px;font-weight:700;color:#777;margin-bottom:8px}
</style>
</head>
<body>

<div class="hdr">
  <div class="sub">GROK PROMPT GENERATOR</div>
  <h1>TikTokバズ動画<br>プロンプト生成</h1>
  <p>フック → 使用シーン → 説明欄CTA</p>
</div>

<div class="api-bar">
  <div class="al">🔑 Gemini API Key</div>
  <input type="text" id="api-key" placeholder="AIzaSy..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  <div class="hint">👉 <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> で無料取得</div>
</div>

<div class="rule">
  <div class="rule-title">動画構成</div>
  <div class="rule-row">
    <div class="rule-card"><div class="t">0-10秒</div><div class="r">フック</div><div class="d">テロップ+セリフ</div></div>
    <div class="rule-card"><div class="t">10-20秒</div><div class="r">使用シーン</div><div class="d">実際に使う映像</div></div>
    <div class="rule-card"><div class="t">20-30秒</div><div class="r">CTA</div><div class="d">説明欄誘導</div></div>
  </div>
</div>

<div class="wrap">
  <div class="imgs">
    <div class="img-slot">
      <div class="img-slot-label">👩 インフルエンサー <span class="badge" id="inf-badge"></span></div>
      <input type="file" accept="image/*" class="file-input" id="inf-file" onchange="handleFile(this.files,'inf')">
      <div class="img-prev" id="inf-prev">
        <img id="inf-img" src="" alt="">
        <button type="button" class="img-del" onclick="clearInf()">✕</button>
      </div>
    </div>
    <div class="img-slot">
      <div class="img-slot-label">📦 商品画像</div>
      <input type="file" accept="image/*" class="file-input" id="prod-file" onchange="handleFile(this.files,'prod')">
      <div class="img-prev" id="prod-prev">
        <img id="prod-img" src="" alt="">
        <button type="button" class="img-del" onclick="clearProd()">✕</button>
      </div>
    </div>
  </div>

  <div class="mb">
    <div class="lbl">商品名（タイトル貼付）*</div>
    <input type="text" id="pn-input" placeholder="例: パンケーキミックス ふわふわ 200g...">
    <div id="ai-status" class="ai-status" style="display:none"></div>
    <div id="sn-row" class="sn-row">
      <span style="font-size:10px;color:#888">セリフ用:</span>
      <span class="tag" id="sn-tag"></span>
      <input type="text" id="sn-input" placeholder="変更可">
    </div>
    <div id="scene-info" class="scene-info"></div>
    <div id="merit-info" class="merit-info"></div>
  </div>

  <div class="mb">
    <div class="lbl">女性スタイル</div>
    <select id="style-sel">
      <option value="清楚系">清楚系</option>
      <option value="大人キレイ系" selected>大人キレイ系</option>
      <option value="韓国系">韓国系</option>
      <option value="小悪魔系">小悪魔系</option>
    </select>
  </div>

<button class="gen-btn" id="gen-btn" onclick="generate()">🎬 プロンプト生成</button>

</div>

<div id="results" class="results"></div>

<script>
// ===== NO addEventListener, NO state dependency for button =====
// Read everything from DOM directly when needed

var infB64=null, prodB64=null;
var aiResult=null; // cached AI result

var TELOPS=["まだ知らないの？","え、これ知ってる？","正直これなしじゃ無理","もっと早く知りたかった","これ1つで全部解決","3日で変わった…","ガチで毎日使ってる","教えたくなかったけど…","概念変わるよこれ","知らないと損してる","やばいの見つけた","マジで人生変わる","これ以外考えられない","1回使ったら戻れない"];
var CTAS=["気になる人は説明欄から","詳細は説明欄をチェック","説明欄にリンク貼ってます","これマジでおすすめ→説明欄","在庫なくなる前に→説明欄"];
function pick(a){return a[Math.floor(Math.random()*a.length)];}

var STYLES={
  "清楚系":"清楚で可愛い日本人女性（黒髪ロング、ナチュラルメイク、白い肌、清潔感のあるカジュアル服装）",
  "大人キレイ系":"大人っぽく綺麗な日本人女性（ゆるウェーブヘア、艶やかなメイク、おしゃれな服装）",
  "韓国系":"韓国風の美しい日本人女性（ストレートヘア、透明感のある肌、水光メイク、トレンド韓国ファッション）",
  "小悪魔系":"小悪魔系の可愛い日本人女性（ミディアムヘア、上目遣い、甘えた表情、キャミソールやオフショルダー）"
};
var STYLES_EN={
  "清楚系":"beautiful Japanese woman, long straight black hair, natural makeup, fair skin, stylish casual outfit",
  "大人キレイ系":"beautiful mature Japanese woman, wavy brown hair, glamorous makeup, fashionable outfit, sophisticated",
  "韓国系":"beautiful Korean-style Japanese woman, sleek straight hair, luminous glass skin, trendy Korean fashion",
  "小悪魔系":"cute playful Japanese woman, medium length hair, charming coy smile, trendy off-shoulder top"
};

// ===== Helper: read values from DOM =====
function getPn(){return(document.getElementById('pn-input').value||'').trim();}
function getKey(){return(document.getElementById('api-key').value||'').trim();}
function getSt(){return document.getElementById('style-sel').value||'大人キレイ系';}
function getSn(){var v=document.getElementById('sn-input').value;return v||(aiResult&&aiResult.shortName)||'';}

// ===== Gemini API =====
function callGemini(key,prompt,imgB64){
  var parts=[];
  if(imgB64){
    var mt='image/jpeg';
    if(imgB64.indexOf('data:image/png')>=0)mt='image/png';
    parts.push({inlineData:{mimeType:mt,data:imgB64.split(',')[1]}});
  }
  parts.push({text:prompt});
  return fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+key,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:parts}],generationConfig:{temperature:0.9,maxOutputTokens:1024}})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error.message);
    if(!d.candidates||!d.candidates[0])throw new Error('Empty response');
    return d.candidates[0].content.parts[0].text;
  });
}

function callGeminiImage(key,prompt,refB64){
  var parts=[];
  if(refB64){
    var mt='image/jpeg';
    if(refB64.indexOf('data:image/png')>=0)mt='image/png';
    parts.push({inlineData:{mimeType:mt,data:refB64.split(',')[1]}});
  }
  parts.push({text:prompt});
  return fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key='+key,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:parts}],generationConfig:{responseModalities:["TEXT","IMAGE"],temperature:1.0,maxOutputTokens:1024}})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error)throw new Error(d.error.message);
    if(!d.candidates||!d.candidates[0])throw new Error('Failed');
    var rp=d.candidates[0].content.parts;
    for(var i=0;i<rp.length;i++){if(rp[i].inlineData)return'data:'+rp[i].inlineData.mimeType+';base64,'+rp[i].inlineData.data;}
    throw new Error('No image data');
  });
}

// ===== IMAGE HANDLING =====
function fileToBase64(file,cb){
  var r=new FileReader();
  r.onloadend=function(){cb(r.result);};
  r.onerror=function(){cb(null);};
  r.readAsDataURL(file);
}

function handleFile(files,type){
  if(!files||files.length===0)return;
  var f=files[0];if(!f)return;
  var blobUrl=window.URL.createObjectURL(f);
  if(type==='inf'){
    document.getElementById('inf-img').src=blobUrl;
    document.getElementById('inf-file').style.display='none';
    document.getElementById('inf-prev').style.display='block';
    document.getElementById('inf-badge').textContent='(固定中)';
    fileToBase64(f,function(b64){infB64=b64;});
  }else{
    document.getElementById('prod-img').src=blobUrl;
    document.getElementById('prod-file').style.display='none';
    document.getElementById('prod-prev').style.display='block';
    fileToBase64(f,function(b64){prodB64=b64;});
  }
}

function clearInf(){
  infB64=null;
  document.getElementById('inf-prev').style.display='none';
  document.getElementById('inf-file').style.display='block';
  document.getElementById('inf-badge').textContent='';
  document.getElementById('inf-file').value='';
}
function clearProd(){
  prodB64=null;
  document.getElementById('prod-prev').style.display='none';
  document.getElementById('prod-file').style.display='block';
  document.getElementById('prod-file').value='';
}

// ===== MAIN GENERATE (AI + prompts in one flow) =====
function generate(){
  var pn=getPn();
  var key=getKey();
  if(!pn){alert('商品名を入力してください');return;}
  if(!key){alert('Gemini API Keyを入力してください');return;}

  var btn=document.getElementById('gen-btn');
  btn.disabled=true;btn.textContent='🔍 Gemini分析中...';

  // Step 1: Call Gemini for AI analysis (serifs, shortName, etc.)
  var prompt="JSONのみ回答。Markdownコードブロック不要。余計な説明不要。\n商品名:「"+pn+"」\n\nTask1 shortName: 2〜8文字に簡略化。修飾語・スペック・記号を全削除。\n例:「9インチCarPlay車載ディスプレイ」→「車載ディスプレイ」「パンケーキミックス200g」→「パンケーキ」\n\nTask2 category: food/beauty/health/gadget/home/fashion/other から1つ\n\nTask3 keyMerit: 商品名から読み取れる最大の特徴を具体的に（数字・成分・食感ワードを使う）\n\nTask4 usageScene: 商品を使う自然なシーン1文\n\nTask5 セリフ3本 ★重要★\nルール: shortNameのみ使用 / タメ口女の子語尾 / keyMeritの具体ワードを必ず入れる\n禁止ワード: やばい・すごい・まじで・色々試した・効果が本当に・もう手放せない・実際使ってみたら・概念が変わった\n\ncategoryごとの参考例:\nfood→「混ぜて焼くだけでこんなにふわふわになるの見て？」\nbeauty→「ヒアルロン酸がぷるっぷるで塗った瞬間分かるよ」\ngadget→「10000mAhなのにこんなにコンパクトなの知ってた？」\nhealth→「低反発で座ってみたら腰の重さが全然違うの分かる？」\nfashion→「この素材で着るだけでスタイルよく見えるの知ってた？」\n\nhook(25〜45字): 商品の特徴を最初に言って「〜見て？」「〜知ってた？」「〜分かる？」で終わる\nmerit(30〜50字): keyMeritの体験を具体的に。禁止ワード不使用\nclose(20〜35字): 共感+説明欄誘導\n\nJSON: {\"shortName\":\"名\",\"category\":\"カテゴリ\",\"keyMerit\":\"魅力\",\"usageScene\":\"シーン\",\"hook\":\"セリフ\",\"merit\":\"セリフ\",\"close\":\"セリフ\"}";

  callGemini(key,prompt,prodB64).then(function(raw){
    var clean=raw.replace(/```json\n?|```/g,'').trim();
    var m=clean.match(/\{[\s\S]*\}/);if(m)clean=m[0];
    try{
      aiResult=JSON.parse(clean);
    }catch(e){
      aiResult=null;
    }

    // Show AI results
    if(aiResult){
      if(aiResult.shortName){
        document.getElementById('sn-row').style.display='flex';
        document.getElementById('sn-tag').textContent='「'+aiResult.shortName+'」';
        document.getElementById('sn-input').value=aiResult.shortName;
      }
      if(aiResult.usageScene){
        document.getElementById('scene-info').style.display='block';
        document.getElementById('scene-info').textContent='🎬 '+aiResult.usageScene;
      }
      if(aiResult.keyMerit){
        document.getElementById('merit-info').style.display='block';
        document.getElementById('merit-info').textContent='✨ 訴求ポイント: '+aiResult.keyMerit;
      }
    }

    // Step 2: Build prompts with AI-generated serifs
    btn.textContent='🎬 プロンプト生成中...';
    setTimeout(function(){
      var r=buildPrompts(pn);
      renderResults(r);
      btn.disabled=false;btn.textContent='🎬 プロンプト生成';
    },100);

  }).catch(function(e){
    alert('Gemini API エラー: '+e.message);
    btn.disabled=false;btn.textContent='🎬 プロンプト生成';
  });
}

function buildPrompts(pn){
  var sn=getSn()||(aiResult&&aiResult.shortName)||'これ';
  var st=getSt();
  var telop=pick(TELOPS);
  var cta=pick(CTAS);
  var s1=(aiResult&&aiResult.hook)||'これが気になりすぎて試してみたから見て？';
  var s2=(aiResult&&aiResult.merit)||'使い始めて分かったんだけど、全然違ったの。';
  var s3=(aiResult&&aiResult.close)||'気になった人は説明欄からチェックしてみて。';
  var us=(aiResult&&aiResult.usageScene)||'女性が商品を実際に使用しているシーン';
  var sd=STYLES[st]||STYLES['大人キレイ系'];
  var se=STYLES_EN[st]||STYLES_EN['大人キレイ系'];

  var inf=infB64?'\n\nINFLUENCER: 添付のインフルエンサー写真の人物の顔・髪型・体型を忠実に再現すること。':'';
  var pr=prodB64?'\n\nPRODUCT IMAGE: 添付の商品画像のデザイン・色・形・ロゴを忠実に再現すること。':'';
  var ref='\n\n[PRODUCT]\nFull: '+pn+'\nSpeak as: '+sn+' ONLY.';

  var p1='Generate a 10-second vertical video (9:16).\n\nScene: '+sd+' が画面に向かって語りかけている。おしゃれな服装。明るい室内。\n\nSpeech: 「'+s1+'」\n驚きから笑顔へ。髪をかき上げる仕草。\n\nTelop: 「'+telop+'」を画面中央上部に大きく表示。太ゴシック白文字黒縁取り。\n\nStyle: Cinematic, soft lighting, shallow DOF, warm. 9:16, photorealistic.'+inf+pr+ref;
  var p2='Generate a 10-second vertical video (9:16).\n\nScene: '+sd+' が「'+sn+'」を使用中。\n使用シーン: '+us+'\n\nAction:\n1. (0-3s) 商品を手に取る\n2. (3-7s) 実際に使用中クローズアップ\n3. (7-10s) 満足リアクション\n\nSpeech: 「'+s2+'」\nTelop: なし。9:16, photorealistic.'+inf+pr+ref;
  var p3='Generate a 10-second vertical video (9:16).\n\nScene: '+sd+' が「'+sn+'」を手に持ち甘い笑顔。背景ボケ。\n\nSpeech: 「'+s3+'」\n最後にウィンク。商品を胸元の高さに。\n\nTelop: 画面左下に「'+cta+'」を最後3秒のみ。小さめ白文字。\nStyle: Golden hour, bokeh. 9:16, photorealistic.'+inf+pr+ref;

  var ir=infB64?'IMPORTANT: Use the person in the reference photo as the model. ':'';
  var prr=prodB64?'The product in the reference photo should appear in her hand. ':'';
  var pt='Photorealistic vertical portrait photo, 9:16 aspect ratio, 1080x1920px.\n'+ir+prr+'Subject: '+se+'. She holds '+sn+' near her chest, looking at camera with a charming confident smile.\nComposition: upper body to thighs, subject slightly left of center, product on right side, 20% empty space at top.\nBackground: bright indoor, white or beige wall, natural window light, beautiful soft bokeh.\nLighting: soft warm cinematic light, shallow depth of field.\nQuality: ultra-high resolution, photorealistic, 4K, magazine quality. First frame of TikTok video.';

  return{promptThumb:pt,prompt1:p1,prompt2:p2,prompt3:p3,telop:telop,speech1:s1,speech2:s2,speech3:s3,cta:cta};
}

// ===== COPY =====
function copyText(text,btnEl){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){showCopied(btnEl);}).catch(function(){fallbackCopy(text,btnEl);});
  }else{fallbackCopy(text,btnEl);}
}
function fallbackCopy(text,btnEl){
  var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0';
  document.body.appendChild(ta);ta.focus();ta.setSelectionRange(0,ta.value.length);
  var ok=false;try{ok=document.execCommand('copy');}catch(e){}document.body.removeChild(ta);
  if(ok)showCopied(btnEl);else{btnEl.textContent='長押しコピー';setTimeout(function(){btnEl.textContent='コピー';},2000);}
}
function showCopied(b){b.textContent='OK!';b.style.background='#27ae60';b.style.color='#fff';setTimeout(function(){b.textContent='コピー';b.style.background='rgba(255,255,255,0.08)';b.style.color='#aaa';},1500);}

// ===== IMAGE GEN =====
function generateImage(promptId){
  var prompt=document.getElementById(promptId).textContent;
  var btn=document.getElementById('imgbtn-'+promptId);
  var area=document.getElementById('imgarea-'+promptId);
  var key=getKey();if(!key){alert('API Key必要');return;}
  btn.disabled=true;btn.textContent='🎨 画像生成中...';btn.className='gen-img-btn loading';
  callGeminiImage(key,prompt,infB64||prodB64||null).then(function(dataUrl){
    area.innerHTML='<img src="'+dataUrl+'" alt="Generated">';
    var dl=document.createElement('a');dl.className='gen-img-dl';dl.textContent='📥 画像をダウンロード';dl.href=dataUrl;dl.download='tiktok-'+Date.now()+'.png';
    area.appendChild(document.createElement('br'));area.appendChild(dl);
    btn.textContent='🔄 再生成';btn.className='gen-img-btn';btn.disabled=false;
  }).catch(function(e){
    area.innerHTML='<div style="color:#ff6b6b;font-size:11px;padding:8px">⚠️ '+escH(e.message)+'</div>';
    btn.textContent='🎨 リトライ';btn.className='gen-img-btn';btn.disabled=false;
  });
}

// ===== RENDER =====
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function renderResults(r){
  var h='<div class="img-prompt-sec"><div class="img-prompt-hdr"><span class="tt">🖼 冒頭画像プロンプト</span><span class="step">① Geminiで画像生成</span></div><div class="gemini-hint">👉 下の「画像を生成」ボタンで<b>Gemini API</b>から直接画像生成できます</div>'+boxImg('IMAGE','Gemini用・冒頭フレーム',r.promptThumb,'#a855f7',0)+'</div>';
  h+='<div class="preview"><div class="prev-row"><div><div class="ll" style="color:#ff6b6b">TELOP</div><div style="font-size:14px;font-weight:700;color:#ff6b6b;margin-top:2px">「'+escH(r.telop)+'」</div></div><div><div class="ll" style="color:#2ed573">CTA（左下）</div><div style="font-size:12px;font-weight:600;color:#2ed573;margin-top:2px">'+escH(r.cta)+'</div></div></div>';
  h+='<div class="speech-sec"><div class="ll">セリフ（Gemini生成）</div>';
  [{l:"冒頭",t:r.speech1,c:"#ff6b6b"},{l:"中盤",t:r.speech2,c:"#ffa502"},{l:"締め",t:r.speech3,c:"#2ed573"}].forEach(function(x){h+='<div class="speech-line"><span class="la" style="color:'+x.c+'">'+x.l+'</span><span class="tx">'+escH(x.t)+'</span></div>';});
  h+='</div></div>';
  h+='<div class="sec-title">動画プロンプト（Grokに貼り付け）</div>';
  h+=box('PART1','フック(0-10秒)',r.prompt1,'#ff6b6b',1)+box('PART2','使用シーン(10-20秒)',r.prompt2,'#ffa502',2)+box('PART3','CTA(20-30秒)',r.prompt3,'#2ed573',3);
  h+='<button class="regen" onclick="generate()">別パターンで再生成</button>';
  var el=document.getElementById('results');el.style.display='block';el.innerHTML=h;
  el.scrollIntoView({behavior:'smooth',block:'start'});
}

function box(label,sub,content,color,idx){
  var esc=escH(content);
  return'<div class="copy-box" style="background:'+color+'11;border:1px solid '+color+'33"><div class="copy-hdr"><div class="left"><span class="tag" style="background:'+color+'">'+label+'</span><span class="sub">'+sub+'</span></div><button class="copy-btn" style="background:rgba(255,255,255,0.08);color:#aaa" onclick="copyText(document.getElementById(\'pre'+idx+'\').textContent,this)">コピー</button></div><pre class="copy-pre" id="pre'+idx+'">'+esc+'</pre></div>';

}
function boxImg(label,sub,content,color,idx){
var esc=escH(content);
return’<div class="copy-box" style="background:'+color+'11;border:1px solid '+color+'33"><div class="copy-hdr"><div class="left"><span class="tag" style="background:'+color+'">’+label+’</span><span class="sub">’+sub+’</span></div><button class="copy-btn" style="background:rgba(255,255,255,0.08);color:#aaa" onclick="copyText(document.getElementById(\'pre'+idx+'\').textContent,this)">コピー</button></div><pre class="copy-pre" id="pre'+idx+'">’+esc+’</pre><div id="imgarea-pre'+idx+'" class="gen-img-area"></div><button id="imgbtn-pre'+idx+'" class="gen-img-btn" onclick="generateImage(\'pre'+idx+'\')">🎨 Geminiで画像を生成</button></div>’;
}

// ===== INIT: restore API key =====
try{var sk=localStorage.getItem(‘gemini_api_key’);if(sk)document.getElementById(‘api-key’).value=sk;}catch(e){}
// Save API key on blur (works on all browsers)
document.getElementById(‘api-key’).onblur=function(){try{localStorage.setItem(‘gemini_api_key’,this.value);}catch(e){}};
</script>
